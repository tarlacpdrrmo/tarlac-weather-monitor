<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DOST Live Sensors - Sandbox Fix</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />
    
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

    <style>
        body, html { margin: 0; padding: 0; font-family: 'Inter', sans-serif; overflow: hidden; }
        #map { height: 100vh; width: 100vw; background: #0f172a; }

        /* Clean Header */
        .header-panel {
            position: absolute;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 1000;
            background: rgba(15, 23, 42, 0.85);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 12px 24px;
            border-radius: 30px;
            color: white;
            box-shadow: 0 10px 25px rgba(0,0,0,0.5);
            text-align: center;
        }

        .header-title {
            font-size: 14px;
            font-weight: 900;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: #38bdf8;
            margin-bottom: 4px;
        }
        
        .header-subtitle {
            font-size: 10px;
            font-weight: 600;
            color: #94a3b8;
            letter-spacing: 0.5px;
        }

        /* Marker CSS */
        .dost-pulse {
            border-radius: 50%;
            box-shadow: 0 0 10px rgba(16, 185, 129, 0.8);
        }

        /* Leaflet Pop-up Styling */
        .leaflet-popup-content-wrapper { border-radius: 12px; font-family: 'Inter', sans-serif; }
        .leaflet-popup-content { margin: 15px; color: #1e293b; }
        
        /* GPS box inside popup */
        .gps-box { background: rgba(0,0,0,0.04); border: 1px solid rgba(0,0,0,0.08); padding: 6px 10px; border-radius: 8px; margin-top: 6px; margin-bottom: 6px; font-size: 10px; font-family: monospace; font-weight: 600; color: #475569; display: flex; align-items: center; gap: 6px; }
    </style>
</head>
<body>

    <div class="header-panel">
        <div class="header-title">DOST-ASTI Live Feed Sandbox</div>
        <div class="header-subtitle">Real-time PhilSensors Data (Tarlac)</div>
    </div>

    <div id="map"></div>

    <script>
        // 1. Initialize the Map centered on Tarlac
        var map = L.map('map', { zoomControl: false }).setView([15.48, 120.59], 10);
        L.control.zoom({ position: 'topleft' }).addTo(map);

        // 2. Add Dark Basemap
        L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', {
            attribution: '&copy; OpenStreetMap',
            maxZoom: 19
        }).addTo(map);

        // 3. Create a layer specifically for the markers
        var liveDostMarkers = L.featureGroup().addTo(map);

        // 4. Using AllOrigins Proxy Link
        const DOST_API_URL = "https://api.allorigins.win/get?url=" + encodeURIComponent("https://philsensors.asti.dost.gov.ph/api/data/waterlevel-parameter-latest?ascending=false");

        async function loadDOSTData() {
            try {
                console.log("Fetching DOST data via proxy...");
                const response = await fetch(DOST_API_URL);
                const rawWrapper = await response.json();
                
                // Unpack and parse the string nested inside rawWrapper.contents
                const actualData = JSON.parse(rawWrapper.contents);
                
                // Handle both GeoJSON arrays and flat data structures dynamically
                let sensorList = actualData.features || actualData.data || actualData || [];

                console.log(`Unpacked ${sensorList.length} total network nodes.`);

                liveDostMarkers.clearLayers();
                let tarlacCount = 0;

                // Loop through sensors
                sensorList.forEach(item => {
                    // Look directly at the root item, or inside properties if present
                    let props = item.properties ? item.properties : item;
                    
                    // Safe extract province text
                    let province = (props.province || item.province || "").toUpperCase();
                    
                    if (province === "TARLAC") {
                        
                        // BULLETPROOF COORDINATE PICKER: Looks everywhere on the object
                        let lat = NaN;
                        let lng = NaN;

                        if (item.latitude !== undefined && item.longitude !== undefined) {
                            lat = parseFloat(item.latitude);
                            lng = parseFloat(item.longitude);
                        } else if (item.lat !== undefined && item.long !== undefined) {
                            lat = parseFloat(item.lat);
                            lng = parseFloat(item.long);
                        } else if (item.geometry && item.geometry.coordinates) {
                            lng = parseFloat(item.geometry.coordinates[0]);
                            lat = parseFloat(item.geometry.coordinates[1]);
                        }

                        // If coordinates are valid numbers, plot the point!
                        if (!isNaN(lat) && !isNaN(lng)) {
                            tarlacCount++;
                            
                            // Determine Status & Color
                            let statusVal = props.status !== undefined ? props.status : props.station_status;
                            let isActive = statusVal === 1;
                            let statusColor = isActive ? '#10b981' : '#ef4444'; 
                            let statusText = isActive ? 'ACTIVE' : 'OFFLINE';
                            
                            // Extract Data Fields
                            let wl = props.waterlevel !== undefined ? props.waterlevel : props.water_level;
                            let wlText = wl !== undefined && wl !== null ? `${wl} m` : 'Data Unavailable';
                            let typeName = props.type_name || props.type || 'WLMS';
                            let locationName = props.name || props.location || props.station_name || 'Unknown Location';

                            // Create the Marker Dot Layout
                            let markerIcon = L.divIcon({
                                html: `<div class="dost-pulse" style="width: 14px; height: 14px; background-color: ${statusColor}; border: 2px solid white; border-radius: 50%;"></div>`,
                                className: 'custom-div-icon',
                                iconSize: [14, 14],
                                iconAnchor: [7, 7]
                            });

                            let marker = L.marker([lat, lng], { icon: markerIcon });

                            // Build Pop-up details
                            marker.bindPopup(`
                                <div style="min-width: 200px;">
                                    <strong style="font-size: 14px; text-transform: uppercase; color: #0f172a; display: block; border-bottom: 2px solid #e2e8f0; padding-bottom: 6px; margin-bottom: 10px;">
                                        ${locationName}
                                    </strong>
                                    
                                    <div style="font-size: 12px; margin-bottom: 6px;">
                                        <b style="color: #64748b;">TYPE:</b> ${typeName}
                                    </div>
                                    <div style="font-size: 12px; margin-bottom: 10px;">
                                        <b style="color: #64748b;">STATUS:</b> <span style="color: ${statusColor}; font-weight: bold;">${statusText}</span>
                                    </div>
                                    
                                    <div class="gps-box">
                                        <i class="fa-solid fa-location-crosshairs"></i> ${lat.toFixed(5)}, ${lng.toFixed(5)}
                                    </div>
                                    
                                    <div style="font-size: 14px; margin-top: 8px;">
                                        <b>Water Level:</b> <span style="color: #0284c7; font-weight: 900;">${wlText}</span>
                                    </div>
                                </div>
                            `);
                            
                            liveDostMarkers.addLayer(marker);
                        }
                    }
                });

                console.log(`✅ Success! Plotted ${tarlacCount} DOST sensors in Tarlac.`);
                
                // Fit map frame around the sensors if any were found
                if (tarlacCount > 0) {
                    map.fitBounds(liveDostMarkers.getBounds(), { padding: [50, 50] });
                }

            } catch (error) {
                console.error("🚨 Sandbox Parse/Fetch Error:", error);
            }
        }

        // 5. Run the fetch immediately
        loadDOSTData();

    </script>
</body>
</html>
